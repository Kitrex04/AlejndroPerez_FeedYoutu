<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Youtube</title>
  <link rel="stylesheet" href="./tutorial.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=menu" />
</head>
<body>
  <header>
    <!-- PARTE 1: IZQUIERDA (Logo y Menú) -->
    <div class="header-left logo">
        <i class="fa-solid fa-bars"></i> <!-- Icono de menú si tienes -->
        <span class="logo-text">YouTube</span>
    </div>
    
    <!-- PARTE 2: CENTRO (Barra de búsqueda) -->
    <div class="header-center search-container">
        <input type="text" placeholder="Buscar">
        <button><i class="fa-solid fa-magnifying-glass"></i></button>
        <div class="microphone">
            <button><i class="fa-solid fa-microphone"></i></button>
        </div>
    </div>
    
    <!-- PARTE 3: DERECHA (Botón crear, notificaciones, perfil) -->
    <div class="header-right create-button">
        <button><i class="fa-solid fa-plus"></i> Crear</button>
        <i class="fa-regular fa-bell"></i>
        <div class="user-profile">😎</div>
    </div>
</header>
    
    <div class="header-container-2">
      <p>Todo</p>
      <p>Videojuegos</p>
      <p>Música</p>
      <p>Steam</p>
      <p>Age of Empires</p>
      <p>Mixes</p>
      <p>Mod</p>
      <p>Demos</p>
      <p>Warcraft</p>
      <p>Nintendo</p>
      <p>J-pop</p>
      <p>Musica ambiental</p>
      <p>Chill out</p>
      <p>En Directo</p>
      <p>Visto</p>
      <p>Kingdom Hearts</p>
      <p>Tecnologia</p>
    </div>
  </header>
</body>
</html>
