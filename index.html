<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Youtube</title>
  <link rel="stylesheet" href="./tutorial.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=menu" />
</head>
<body>
  <header>
    <div class="header-left logo">
        <span class="material-symbols-outlined">menu</span> 
        <img src="./logo.svg" alt="YouTube-Logo">
    </div>
    
  
    <div class="header-center search-container">
        <input type="text" placeholder="Buscar">
        <button><i class="fa-solid fa-magnifying-glass"></i></button>
        <div class="microphone">
            <button><i class="fa-solid fa-microphone"></i></button>
        </div>
    </div>
    
   
    <div class="header-right create-button">
        <button><i class="fa-solid fa-plus"></i>Crear</button>
        <i class="fa-regular fa-bell"></i>
        <i class="fa-regular fa-circle-user"></i>
    </div>
</header>

<div class="main-layout">
  <!-- Barra Lateral (Aside) -->
  <aside class="sidebar">
    <a href="#" class="sidebar-item active">
      <img src="./casa.svg" alt="home">
      <span>Principal</span>
    </a>
    <a href="#" class="sidebar-item">
      <i class="fa-solid fa-bolt"></i>
      <span>Shorts</span>
    </a>
    <a href="#" class="sidebar-item">
      <i class="fa-solid fa-layer-group"></i>
      <span>Suscripciones</span>
    </a>

    <hr class="sidebar-divider">

    <a href="#" class="sidebar-item">
      <i class="fa-solid fa-photo-film"></i>
      <span>Tú</span>
    </a>
    <a href="#" class="sidebar-item">
      <i class="fa-solid fa-clock-rotate-left"></i>
      <span>Historial</span>
    </a>
    <a href="#" class="sidebar-item">
      <i class="fa-solid fa-list-check"></i>
      <span>Listas</span>
    </a>
    <a href="#" class="sidebar-item">
      <i class="fa-regular fa-clock"></i>
      <span>Ver más tarde</span>
    </a>
    <a href="#" class="sidebar-item">
      <i class="fa-regular fa-thumbs-up"></i>
      <span>Videos que me gustan</span>
    </a>
  </aside>
